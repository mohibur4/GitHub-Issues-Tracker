<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - GitHub Issues Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

</head>

<body class="min-h-screen bg-slate-100 flex items-center justify-center">

<div class="bg-white p-8 rounded-xl shadow w-80 flex flex-col gap-4">

<h2 class="text-xl font-bold text-center">GitHub Issues Tracker</h2>

<input id="username" type="text" placeholder="Username"
class="input input-bordered w-full"/>

<input id="password" type="password" placeholder="Password"
class="input input-bordered w-full"/>

<button id="loginBtn"
class="btn btn-primary w-full">
Sign In
</button>

<p id="errorMsg" class="text-red-500 text-sm hidden">
Invalid username or password
</p>

<div class="text-center text-xs text-gray-400">
Demo: admin / admin123
</div>

</div>

<script src="js/login.js"></script>

</body>
</html>
